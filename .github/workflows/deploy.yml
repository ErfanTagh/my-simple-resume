# ─────────────────────────────────────────────────────────────
# FILE: .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────

name: Deploy to Production        # Name shown in GitHub Actions UI

on:
  push:
    branches:
      - main                      # Triggers on every push to main
  workflow_dispatch:              # Also allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest        # GitHub spins up a fresh Ubuntu VM for this job
    timeout-minutes: 15           # Kill the job if it hangs beyond 15 min

    steps:
      - name: 🚀 Deploy to Production Server
        uses: appleboy/ssh-action@v1.1.0   # Third-party action that SSHes into your server
        with:
          host: 37.27.31.223               # Your Hetzner server IP
          username: root                   # SSH directly as root (deploy key is in /root/.ssh/authorized_keys)
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Private key stored in GitHub repo secrets
          port: 22
          script_stop: true               # If any command fails, stop immediately (don't continue)
          script: |
            set -euo pipefail
            # -e  = exit immediately on any error
            # -u  = treat unset variables as errors
            # -o pipefail = a pipe fails if any command in it fails (not just the last one)

            echo "🔄 Starting deployment..."

            PROJECT_DIR="/root/my-simple-resume"          # Absolute path — never use ~ in scripts
            BACKUP_DIR="/root/backups/$(date +%Y%m%d_%H%M%S)"  # Timestamped backup folder

            cd "$PROJECT_DIR"

            # ── STEP 0: Database backup ──────────────────────────────────────────
            echo "💾 Backing up database..."
            mkdir -p "$BACKUP_DIR"
            docker exec resume_mongodb mongodump \
              --archive="$BACKUP_DIR/mongodb_backup.archive" \
              --gzip \
              || echo "⚠️  Backup failed, continuing anyway..."
            # We use || echo so a backup failure doesn't abort the whole deployment.
            # mongodump runs INSIDE the resume_mongodb container, writes to a host path
            # that is bind-mounted into the container via the backup volume.

            # ── STEP 1: Pull latest code ─────────────────────────────────────────
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            # reset --hard discards any local changes and sets HEAD to origin/main.
            # We intentionally do NOT use "git clean -fd" because that would delete
            # the .env file which is not tracked in git but is required at runtime.

            # ── STEP 2: Build new Docker images ──────────────────────────────────
            echo "📦 Building new images..."
            docker compose -f docker-compose.prod.yml build backend frontend
            # Builds new images from updated code. Old containers are STILL RUNNING
            # and serving traffic during this step — zero downtime so far.
            # We only rebuild backend and frontend; mongodb and certbot don't change.

            # ── STEP 3: Run database migrations ──────────────────────────────────
            echo "🔄 Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm --no-deps backend \
              python manage.py migrate --noinput
            # --rm         = delete the temporary container after it exits
            # --no-deps    = don't start mongodb again, it's already running
            # --noinput    = don't prompt for confirmation
            # This runs migrations BEFORE swapping the backend container,
            # so if migrations fail the old backend is still serving traffic safely.

            # ── STEP 4: Swap in the new backend ──────────────────────────────────
            echo "🔄 Updating backend container..."
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            # -d        = detached (run in background)
            # --no-deps = don't touch mongodb, certbot, or frontend — only backend
            # Docker stops the old backend container and starts the new one.

            # Wait for backend to be healthy before proceeding
            echo "⏳ Waiting for backend to be healthy..."
            timeout=60
            healthy=false
            while [ $timeout -gt 0 ]; do
              if docker exec resume_backend python -c \
                "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')" \
                2>/dev/null; then
                healthy=true
                break
              fi
              sleep 2
              timeout=$((timeout - 2))
            done
            # Polls every 2 seconds for up to 60 seconds.
            # Tries to hit /api/health/ inside the container on localhost:8000.
            # If the endpoint doesn't exist in your Django app yet, add a simple view
            # that just returns HTTP 200.

            if [ "$healthy" = false ]; then
              echo "❌ Backend failed health check!"
              docker compose -f docker-compose.prod.yml logs --tail 50 backend
              exit 1   # Abort deployment — gateway_nginx still routes to old backend
            fi
            echo "✅ Backend is healthy"

            # ── STEP 5: Swap in the new frontend ─────────────────────────────────
            echo "🔄 Updating frontend container..."
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            # Same pattern as backend. The frontend container builds the React app
            # and writes output into the shared Docker volume (frontend_volume).
            # gateway_nginx serves files from that volume directly.

            # Wait for the frontend build to complete and files to appear
            echo "⏳ Waiting for frontend build..."
            timeout=180   # React builds can take a while
            ready=false
            while [ $timeout -gt 0 ]; do
              if docker ps --filter "name=resume_frontend" --filter "status=running" \
                   --format "{{.Names}}" | grep -q "resume_frontend" && \
                 docker exec resume_frontend test -f /usr/share/nginx/html/index.html 2>/dev/null; then
                ready=true
                break
              fi
              sleep 3
              timeout=$((timeout - 3))
            done

            if [ "$ready" = false ]; then
              echo "❌ Frontend build failed or timed out!"
              docker compose -f docker-compose.prod.yml logs --tail 50 frontend
              exit 1
            fi
            echo "✅ Frontend is ready"

            # ── STEP 6: Reload the gateway nginx ─────────────────────────────────
            echo "🔄 Reloading gateway nginx..."
            docker exec gateway_nginx nginx -t
            # -t = test the config for syntax errors BEFORE reloading.
            # If this fails, the reload below won't run (script_stop: true).

            docker exec gateway_nginx nginx -s reload
            # -s reload = sends a SIGHUP signal to the nginx master process.
            # nginx gracefully finishes existing connections then reloads config.
            # Zero downtime — no connections are dropped.
            # NOTE: gateway_nginx is in /root/nginx-gateway/, NOT in this project's
            # compose. We use docker exec directly instead of docker compose exec.

            # ── STEP 7: Verify all containers are up ─────────────────────────────
            echo "🔍 Verifying containers..."
            for container in resume_backend resume_frontend resume_mongodb gateway_nginx; do
              if docker ps --filter "name=$container" --filter "status=running" \
                   --format "{{.Names}}" | grep -q "^${container}$"; then
                echo "  ✅ $container is running"
              else
                echo "  ❌ $container is NOT running!"
                docker logs "$container" --tail 30 || true
                exit 1
              fi
            done
            # Loops over all four critical containers and confirms each is running.
            # We check gateway_nginx here (not resume_nginx — that no longer exists).

            # ── STEP 8: End-to-end smoke test ────────────────────────────────────
            echo "🏥 Smoke test through nginx..."
            sleep 3   # Give everything a moment to stabilize
            if curl -f -s --max-time 10 https://123resume.de/api/health/ > /dev/null 2>&1; then
              echo "✅ End-to-end health check passed"
            else
              echo "⚠️  /api/health/ not responding — containers are up but check manually"
            fi
            # This hits the live domain over HTTPS — goes through gateway_nginx → backend.
            # We use || true semantics (no exit 1) so a missing health endpoint
            # doesn't fail an otherwise successful deployment.

            # ── STEP 9: Cleanup ───────────────────────────────────────────────────
            echo "🧹 Pruning old images for this project..."
            docker image prune -f \
              --filter "label=com.docker.compose.project=my-simple-resume" \
              --filter "until=24h" || true
            # Scoped to THIS project's images only via the compose project label.
            # "until=24h" = only remove images older than 24 hours (keeps today's build).
            # || true = don't fail the deployment if prune fails.

            echo "🧹 Keeping last 3 database backups..."
            (ls -dt /root/backups/*/ 2>/dev/null | tail -n +4 | xargs rm -rf) || true
            # ls -dt  = list dirs sorted by time, newest first
            # tail -n +4 = skip the 3 newest, print the rest (i.e. everything older)
            # xargs rm -rf = delete those older ones

            echo "✅ Deployment complete!"
            docker compose -f docker-compose.prod.yml ps

      # ── These steps run on the GitHub-hosted runner, not the server ──────────
      - name: ✅ Success
        if: success()
        run: echo "✅ Deployed successfully to https://123resume.de"

      - name: ❌ Failed
        if: failure()
        run: |
          echo "❌ Deployment failed — check the logs above."
          echo "To debug: ssh root@37.27.31.223 'cd /root/my-simple-resume && docker compose -f docker-compose.prod.yml logs --tail 100'"
